<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spirit Mark SVG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Chivo', sans-serif;
    }

    .hero-banner {
      width: 100%;
      height: 600px;
      overflow: hidden;
      position: relative;
      background: #000000;
    }

    .hero-banner img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
    }

    h1 {
      padding: 2rem;
      font-weight: 700;
      color: #005bbb;
    }
  </style>
</head>
<body>
  <div class="hero-banner">
    <img src="spirit-mark.svg" alt="Spirit Mark">
  </div>
  <h1>Spirit Mark Graphic</h1>
</body>
</html>
