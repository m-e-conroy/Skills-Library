<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibrant Algorithmic Art</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
    }
    
    /* FAB Button */
    .fab {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      z-index: 1001;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fab:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 28px rgba(102, 126, 234, 0.6);
    }
    .fab:active {
      transform: scale(0.95);
    }
    .fab.open {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    .fab svg {
      width: 24px;
      height: 24px;
      fill: white;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .fab.open svg {
      transform: rotate(180deg);
    }
    
    /* Controls Menu */
    .controls {
      position: fixed;
      bottom: 100px;
      right: 30px;
      background: rgba(20, 20, 30, 0.98);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 0;
      backdrop-filter: blur(20px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      z-index: 1000;
      opacity: 0;
      transform: translateY(20px) scale(0.9);
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 200px;
    }
    .controls.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }
    .controls-inner {
      padding: 20px;
    }
    .controls h3 {
      margin: 0 0 16px 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .control-btn {
      background: rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.3);
      color: white;
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: left;
      backdrop-filter: blur(10px);
    }
    .control-btn:hover {
      background: rgba(102, 126, 234, 0.25);
      border-color: rgba(102, 126, 234, 0.5);
      transform: translateX(-4px);
    }
    .control-btn:active {
      transform: translateX(-2px);
    }
    .control-btn.pause {
      background: rgba(245, 87, 108, 0.15);
      border-color: rgba(245, 87, 108, 0.3);
    }
    .control-btn.pause:hover {
      background: rgba(245, 87, 108, 0.25);
      border-color: rgba(245, 87, 108, 0.5);
    }
    
    /* Color Scheme Buttons */
    .color-schemes {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .color-schemes h4 {
      margin: 0 0 12px 0;
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .scheme-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .scheme-btn {
      aspect-ratio: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px;
    }
    .scheme-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }
    .scheme-btn.active {
      background: rgba(102, 126, 234, 0.25);
      border-color: rgba(102, 126, 234, 0.6);
      box-shadow: 0 0 12px rgba(102, 126, 234, 0.3);
    }
    .scheme-icon {
      font-size: 18px;
      line-height: 1;
    }
    .scheme-label {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    
    /* Interaction Mode */
    .interaction-mode {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .mode-toggle {
      display: flex;
      gap: 8px;
    }
    .mode-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.7);
      padding: 8px;
      font-size: 11px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-align: center;
    }
    .mode-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }
    .mode-btn.active {
      background: rgba(102, 126, 234, 0.25);
      border-color: rgba(102, 126, 234, 0.6);
      color: white;
    }
    .clear-forces-btn {
      margin-top: 8px;
      width: 100%;
      background: rgba(255, 87, 108, 0.15);
      border: 1px solid rgba(255, 87, 108, 0.3);
      color: white;
      padding: 8px;
      font-size: 11px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .clear-forces-btn:hover {
      background: rgba(255, 87, 108, 0.25);
      border-color: rgba(255, 87, 108, 0.5);
    }
    .toggle-visibility-btn {
      margin-top: 8px;
      width: 100%;
      background: rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.3);
      color: white;
      padding: 8px;
      font-size: 11px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .toggle-visibility-btn:hover {
      background: rgba(102, 126, 234, 0.25);
      border-color: rgba(102, 126, 234, 0.5);
    }
  </style>
</head>
<body>
  <!-- FAB Button -->
  <button class="fab" id="fabBtn" onclick="toggleMenu()">
    <svg viewBox="0 0 24 24">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
    </svg>
  </button>
  
  <!-- Controls Menu -->
  <div class="controls" id="controlsMenu">
    <div class="controls-inner">
      <h3>Controls</h3>
      <div class="button-group">
        <button class="control-btn pause" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
        <button class="control-btn" id="resetBtn" onclick="resetSketch()">↻ Start Over</button>
      </div>
      
      <div class="color-schemes">
        <h4>Color Scheme</h4>
        <div class="scheme-grid">
          <button class="scheme-btn active" onclick="setColorScheme('rainbow')" id="scheme-rainbow">
            <div class="scheme-icon">🌈</div>
            <div class="scheme-label">Rainbow</div>
          </button>
          <button class="scheme-btn" onclick="setColorScheme('monochrome')" id="scheme-monochrome">
            <div class="scheme-icon">⚪</div>
            <div class="scheme-label">Mono</div>
          </button>
          <button class="scheme-btn" onclick="setColorScheme('primary')" id="scheme-primary">
            <div class="scheme-icon">🎨</div>
            <div class="scheme-label">Primary</div>
          </button>
          <button class="scheme-btn" onclick="setColorScheme('neon')" id="scheme-neon">
            <div class="scheme-icon">✨</div>
            <div class="scheme-label">Neon</div>
          </button>
          <button class="scheme-btn" onclick="setColorScheme('pastel')" id="scheme-pastel">
            <div class="scheme-icon">🌸</div>
            <div class="scheme-label">Pastel</div>
          </button>
          <button class="scheme-btn" onclick="setColorScheme('fire')" id="scheme-fire">
            <div class="scheme-icon">🔥</div>
            <div class="scheme-label">Fire</div>
          </button>
          <button class="scheme-btn" onclick="setColorScheme('patriotic')" id="scheme-patriotic">
            <div class="scheme-icon">🇺🇸</div>
            <div class="scheme-label">Patriot</div>
          </button>
          <button class="scheme-btn" onclick="setColorScheme('ocean')" id="scheme-ocean">
            <div class="scheme-icon">🌊</div>
            <div class="scheme-label">Ocean</div>
          </button>
          <button class="scheme-btn" onclick="setColorScheme('sunset')" id="scheme-sunset">
            <div class="scheme-icon">🌅</div>
            <div class="scheme-label">Sunset</div>
          </button>
        </div>
      </div>
      
      <div class="interaction-mode">
        <h4>Interaction Mode</h4>
        <div class="mode-toggle">
          <button class="mode-btn" onclick="setInteractionMode('none')" id="mode-none">None</button>
          <button class="mode-btn active" onclick="setInteractionMode('attract')" id="mode-attract">Attract</button>
          <button class="mode-btn" onclick="setInteractionMode('repel')" id="mode-repel">Repel</button>
          <button class="mode-btn" onclick="setInteractionMode('vortex')" id="mode-vortex">Vortex</button>
        </div>
        <button class="clear-forces-btn" onclick="clearForces()">✖ Clear All Forces</button>
        <button class="toggle-visibility-btn" id="toggleVisBtn" onclick="toggleForceVisibility()">👁 Hide Forces</button>
      </div>
    </div>
  </div>
  <script>
    // Particle system for vibrant flowing art
    let particles = [];
    let flowField = [];
    let cols, rows;
    let scl = 30;
    let inc = 0.1;
    let zoff = 0;
    let hueOffset = 0;
    let frameCounter = 0;
    let isPaused = false;
    
    // Mouse interaction
    let prevMouseX = 0;
    let prevMouseY = 0;
    let mouseVelX = 0;
    let mouseVelY = 0;
    let mouseInfluenceRadius = 150;
    let mouseInfluenceRadiusSq = mouseInfluenceRadius * mouseInfluenceRadius; // Cache squared value
    
    // Color scheme
    let colorScheme = 'rainbow';
    
    // Particle lifecycle
    let particleLifespan = 400; // frames
    let spawnRate = 3; // particles per frame
    
    // Interactive forces
    let interactionMode = 'attract'; // 'none', 'attract', 'repel', 'vortex'
    let forcePoints = [];
    let showForceVisuals = true;
    
    // Drag to size
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let currentRadius = 0;
    
    // Cached DOM elements
    let controlsMenu, fabBtn, pauseBtn;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      colorMode(HSB, 360, 100, 100, 100);
      cols = floor(width / scl);
      rows = floor(height / scl);
      
      // Create flow field
      flowField = new Array(cols * rows);
      
      // Create particles
      for (let i = 0; i < 1200; i++) {
        particles.push(new Particle());
      }
      
      background(0, 0, 0);
      
      // Cache DOM elements
      controlsMenu = document.getElementById('controlsMenu');
      fabBtn = document.getElementById('fabBtn');
      pauseBtn = document.getElementById('pauseBtn');
      
      // Initialize mouse tracking
      prevMouseX = mouseX;
      prevMouseY = mouseY;
      
      // Close menu when clicking outside
      document.addEventListener('click', function(event) {
        const isClickInsideMenu = controlsMenu.contains(event.target);
        const isClickOnFab = fabBtn.contains(event.target);
        
        if (!isClickInsideMenu && !isClickOnFab && controlsMenu.classList.contains('open')) {
          toggleMenu();
        }
      });
    }

    function draw() {
      if (isPaused) return;
      
      // Calculate mouse velocity
      mouseVelX = mouseX - prevMouseX;
      mouseVelY = mouseY - prevMouseY;
      prevMouseX = mouseX;
      prevMouseY = mouseY;
      
      // Slight fade effect for motion trails
      fill(0, 0, 0, 3);
      noStroke();
      rect(0, 0, width, height);
      
      // Update flow field only every 3 frames for performance
      frameCounter++;
      if (frameCounter % 3 === 0) {
        let yoff = 0;
        for (let y = 0; y < rows; y++) {
          let xoff = 0;
          for (let x = 0; x < cols; x++) {
            let index = x + y * cols;
            let angle = noise(xoff, yoff, zoff) * TWO_PI * 4;
            let v = p5.Vector.fromAngle(angle);
            v.setMag(0.5);
            flowField[index] = v;
            xoff += inc;
          }
          yoff += inc;
        }
        zoff += 0.003;
      }
      
      // Update and display particles
      for (let i = particles.length - 1; i >= 0; i--) {
        let particle = particles[i];
        particle.follow(flowField);
        particle.applyMouseForce();
        particle.applyForcePoints();
        particle.update();
        particle.show();
        
        // Remove dead particles
        if (particle.isDead()) {
          particles.splice(i, 1);
        }
      }
      
      // Spawn new particles to maintain population
      for (let i = 0; i < spawnRate; i++) {
        if (particles.length < 1200) {
          particles.push(new Particle());
        }
      }
      
      // Draw force points
      drawForcePoints();
      
      hueOffset += 0.3;
    }

    function drawForcePoints() {
      // Draw preview circle while dragging
      if (isDragging && interactionMode !== 'none') {
        push();
        noFill();
        
        // Color based on type
        if (interactionMode === 'attract') {
          stroke(120, 80, 80, 40); // Green
        } else if (interactionMode === 'repel') {
          stroke(0, 80, 80, 40); // Red
        } else if (interactionMode === 'vortex') {
          stroke(280, 80, 80, 40); // Purple
        }
        
        strokeWeight(2);
        circle(dragStartX, dragStartY, currentRadius * 2);
        
        // Center dot
        fill(interactionMode === 'attract' ? color(120, 80, 100, 60) : 
             interactionMode === 'repel' ? color(0, 80, 100, 60) : 
             color(280, 80, 100, 60));
        noStroke();
        circle(dragStartX, dragStartY, 8);
        
        pop();
      }
      
      // Only draw force points if visibility is on
      if (!showForceVisuals) return;
      
      for (let point of forcePoints) {
        push();
        noFill();
        
        // Color based on type
        if (point.type === 'attract') {
          stroke(120, 80, 80, 60); // Green
        } else if (point.type === 'repel') {
          stroke(0, 80, 80, 60); // Red
        } else if (point.type === 'vortex') {
          stroke(280, 80, 80, 60); // Purple
        }
        
        strokeWeight(2);
        circle(point.x, point.y, point.radius * 2);
        
        // Center dot
        fill(point.type === 'attract' ? color(120, 80, 100) : 
             point.type === 'repel' ? color(0, 80, 100) : 
             color(280, 80, 100));
        noStroke();
        circle(point.x, point.y, 8);
        
        pop();
      }
    }

    class Particle {
      constructor() {
        this.pos = createVector(random(width), random(height));
        this.vel = createVector(0, 0);
        this.acc = createVector(0, 0);
        this.maxSpeed = 3;
        this.prevPos = this.pos.copy();
        this.hue = random(360);
        this.alpha = 80;
        this.age = 0;
        this.lifespan = particleLifespan;
      }
      
      follow(vectors) {
        let x = floor(this.pos.x / scl);
        let y = floor(this.pos.y / scl);
        let index = x + y * cols;
        let force = vectors[index];
        if (force) {
          this.applyForce(force);
        }
      }
      
      applyMouseForce() {
        // Calculate distance to mouse
        let dx = mouseX - this.pos.x;
        let dy = mouseY - this.pos.y;
        let distSq = dx * dx + dy * dy;
        
        // Skip expensive sqrt by comparing squared distances
        if (distSq < mouseInfluenceRadiusSq && distSq > 1) {
          // Only calculate sqrt when needed for strength mapping
          let dist = sqrt(distSq);
          
          // Scale force based on distance (stronger when closer)
          let strength = map(dist, 0, mouseInfluenceRadius, 2.5, 0) * 0.15;
          
          // Apply force directly without creating vector object
          this.acc.x += mouseVelX * strength;
          this.acc.y += mouseVelY * strength;
        }
      }
      
      applyForcePoints() {
        for (let point of forcePoints) {
          let dx = point.x - this.pos.x;
          let dy = point.y - this.pos.y;
          let distSq = dx * dx + dy * dy;
          let dist = sqrt(distSq);
          
          if (dist < point.radius && dist > 1) {
            let strength = map(dist, 0, point.radius, point.strength, 0);
            
            if (point.type === 'attract') {
              this.acc.x += (dx / dist) * strength;
              this.acc.y += (dy / dist) * strength;
            } else if (point.type === 'repel') {
              this.acc.x -= (dx / dist) * strength;
              this.acc.y -= (dy / dist) * strength;
            } else if (point.type === 'vortex') {
              // Tangential force for rotation
              let angle = atan2(dy, dx);
              let perpAngle = angle + HALF_PI;
              this.acc.x += cos(perpAngle) * strength * 0.5;
              this.acc.y += sin(perpAngle) * strength * 0.5;
              // Also pull inward slightly
              this.acc.x += (dx / dist) * strength * 0.3;
              this.acc.y += (dy / dist) * strength * 0.3;
            }
          }
        }
      }
      
      applyForce(force) {
        this.acc.add(force);
      }
      
      update() {
        // Age the particle
        this.age++;
        
        // Combine velocity and position updates, check edges inline
        this.vel.add(this.acc);
        this.vel.limit(this.maxSpeed);
        
        // Store previous position before updating
        this.prevPos.x = this.pos.x;
        this.prevPos.y = this.pos.y;
        
        this.pos.add(this.vel);
        this.acc.mult(0);
        
        // Edge wrapping with early returns for performance
        if (this.pos.x > width) {
          this.pos.x = 0;
          this.prevPos.x = 0;
        } else if (this.pos.x < 0) {
          this.pos.x = width;
          this.prevPos.x = width;
        }
        
        if (this.pos.y > height) {
          this.pos.y = 0;
          this.prevPos.y = 0;
        } else if (this.pos.y < 0) {
          this.pos.y = height;
          this.prevPos.y = height;
        }
      }
      
      isDead() {
        return this.age > this.lifespan;
      }
      
      show() {
        let speed = this.vel.mag();
        let hue, saturation, brightness;
        
        // Fade alpha based on age
        let lifeFraction = this.age / this.lifespan;
        let fadeAlpha;
        if (lifeFraction < 0.1) {
          // Fade in first 10%
          fadeAlpha = map(lifeFraction, 0, 0.1, 0, this.alpha);
        } else if (lifeFraction > 0.8) {
          // Fade out last 20%
          fadeAlpha = map(lifeFraction, 0.8, 1.0, this.alpha, 0);
        } else {
          fadeAlpha = this.alpha;
        }
        
        switch(colorScheme) {
          case 'rainbow':
            hue = (this.hue + hueOffset + this.pos.x * 0.05) % 360;
            saturation = map(speed, 0, this.maxSpeed, 60, 100);
            brightness = map(speed, 0, this.maxSpeed, 40, 100);
            break;
            
          case 'monochrome':
            hue = 240; // Blue
            saturation = 0;
            brightness = map(speed, 0, this.maxSpeed, 30, 100);
            break;
            
          case 'primary':
            // Cycle through red, blue, yellow
            let primaryHues = [0, 240, 60];
            let index = floor((this.hue + hueOffset) / 120) % 3;
            hue = primaryHues[index];
            saturation = map(speed, 0, this.maxSpeed, 70, 100);
            brightness = map(speed, 0, this.maxSpeed, 50, 100);
            break;
            
          case 'neon':
            hue = (this.hue + hueOffset + this.pos.x * 0.05) % 360;
            saturation = 100;
            brightness = map(speed, 0, this.maxSpeed, 60, 100);
            break;
            
          case 'pastel':
            hue = (this.hue + hueOffset + this.pos.x * 0.05) % 360;
            saturation = map(speed, 0, this.maxSpeed, 30, 60);
            brightness = map(speed, 0, this.maxSpeed, 70, 95);
            break;
            
          case 'fire':
            // Red to orange/yellow spectrum with more red
            let fireHue = map(speed, 0, this.maxSpeed, 0, 40);
            hue = fireHue + sin(this.pos.y * 0.01) * 10; // Add flicker
            saturation = map(speed, 0, this.maxSpeed, 80, 100);
            brightness = map(speed, 0, this.maxSpeed, 50, 100);
            break;
            
          case 'patriotic':
            // Red, white, blue cycling
            let patriotHues = [0, 0, 240]; // Red, white (red with low sat), blue
            let patriotIndex = floor((this.hue + hueOffset) / 120) % 3;
            hue = patriotHues[patriotIndex];
            saturation = patriotIndex === 1 ? map(speed, 0, this.maxSpeed, 0, 20) : map(speed, 0, this.maxSpeed, 70, 100);
            brightness = map(speed, 0, this.maxSpeed, 50, 100);
            break;
            
          case 'ocean':
            // Blues and teals
            hue = map(this.pos.x + hueOffset, 0, width, 180, 220);
            saturation = map(speed, 0, this.maxSpeed, 60, 90);
            brightness = map(speed, 0, this.maxSpeed, 40, 85);
            break;
            
          case 'sunset':
            // Oranges, pinks, purples
            let sunsetBase = map(this.pos.y, 0, height, 320, 30);
            hue = (sunsetBase + hueOffset * 0.2) % 360;
            saturation = map(speed, 0, this.maxSpeed, 60, 95);
            brightness = map(speed, 0, this.maxSpeed, 50, 90);
            break;
        }
        
        stroke(hue, saturation, brightness, fadeAlpha);
        strokeWeight(2);
        line(this.pos.x, this.pos.y, this.prevPos.x, this.prevPos.y);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      cols = floor(width / scl);
      rows = floor(height / scl);
      flowField = new Array(cols * rows);
      background(0, 0, 0);
    }

    function mousePressed() {
      // Don't add force points if clicking on UI
      if (mouseX > width - 250 && mouseY > height - 500) {
        return;
      }
      
      // Start dragging for force point sizing
      if (interactionMode !== 'none') {
        isDragging = true;
        dragStartX = mouseX;
        dragStartY = mouseY;
        currentRadius = 0;
        return;
      }
      
      // Add burst of particles at mouse position
      for (let i = 0; i < 30; i++) {
        let p = new Particle();
        p.pos.x = mouseX + random(-20, 20);
        p.pos.y = mouseY + random(-20, 20);
        p.prevPos = p.pos.copy();
        particles.push(p);
      }
      // Remove old particles if too many
      if (particles.length > 3000) {
        particles.splice(0, 30);
      }
    }
    
    function mouseDragged() {
      if (isDragging && interactionMode !== 'none') {
        // Calculate radius based on drag distance
        let dx = mouseX - dragStartX;
        let dy = mouseY - dragStartY;
        currentRadius = sqrt(dx * dx + dy * dy);
      }
    }
    
    function mouseReleased() {
      if (isDragging && interactionMode !== 'none') {
        isDragging = false;
        
        // Only create force point if radius is meaningful (> 20)
        if (currentRadius > 20) {
          forcePoints.push({
            x: dragStartX,
            y: dragStartY,
            type: interactionMode,
            radius: currentRadius,
            strength: 1.5
          });
        }
      }
    }

    function toggleMenu() {
      controlsMenu.classList.toggle('open');
      fabBtn.classList.toggle('open');
    }

    function setColorScheme(scheme) {
      colorScheme = scheme;
      
      // Update active button
      document.querySelectorAll('.scheme-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById('scheme-' + scheme).classList.add('active');
    }

    function setInteractionMode(mode) {
      interactionMode = mode;
      
      // Update active button
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.getElementById('mode-' + mode).classList.add('active');
    }

    function clearForces() {
      forcePoints = [];
    }

    function toggleForceVisibility() {
      showForceVisuals = !showForceVisuals;
      const btn = document.getElementById('toggleVisBtn');
      btn.textContent = showForceVisuals ? '👁 Hide Forces' : '👁 Show Forces';
    }

    function togglePause() {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '▶ Play' : '⏸ Pause';
    }

    function resetSketch() {
      // Clear background
      background(0, 0, 0);
      
      // Reset particles
      particles = [];
      for (let i = 0; i < 1200; i++) {
        particles.push(new Particle());
      }
      
      // Reset flow field
      zoff = 0;
      hueOffset = 0;
      frameCounter = 0;
      
      // Unpause if paused
      if (isPaused) {
        togglePause();
      }
      
      // Close menu
      if (controlsMenu.classList.contains('open')) {
        toggleMenu();
      }
    }
  </script>
</body>
</html>
