<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System with p5.js</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <script>
    let angle = 0;
    let planets = [];
    let stars = [];
    let nebulas = [];
    let galaxies = [];
    let pulsars = [];
    let constellations = [];
    let flameParticles = [];
    let solarFlares = [];
    let lastSolarFlare = 0;
    let starColors = {};
    let starType = '';
    let sunSize = 65; // Base sun size, will be varied
    let starAge = 0; // Star age in billions of years
    let starTemperature = 0; // Surface temperature in Kelvin
    let starLuminosity = 0; // Relative to Sun
    let starMass = 0; // Relative to Sun
    let selectedStar = false;
    let starPanelAnimProgress = 0;
    let starPanelAnimState = 'closed';
    let selectedPulsar = null;
    let pulsarPanelAnimProgress = 0;
    let pulsarPanelAnimState = 'closed';
    let asteroidBelt = null;
    let shootingStars = [];
    let lastShootingStar = 0;
    let selectedPlanet = null;
    let panelAnimProgress = 0;
    let panelAnimState = 'closed'; // 'opening', 'open', 'closing', 'closed'
    let targetPlanet = null;
    let hoveredMoonIndex = -1;
    let moonNamePositions = [];
    let solarSystemName = '';
    let oldSolarSystemName = '';
    let nameTransitionProgress = 0;
    let nameTransitionActive = false;
    let selectedConstellation = null;
    let constellationPanelAnimProgress = 0;
    let constellationPanelAnimState = 'closed';
    let hoveredStarIndex = -1;
    
    // System transition variables
    let isTransitioning = false;
    let transitionPhase = 0; // 0-8 for different phases
    let transitionProgress = 0;
    let transitionSpeed = 0.02;
    let enteringTextFade = 0;
    let selectedConstellationStar = null;
    let constellationZoom = 1;
    let constellationOffsetX = 0;
    let constellationOffsetY = 0;
    let systemFade = 0;
    let otherConstellationsFade = 0;
    let selectedConstellationFade = 0;

    function generateConstellationName() {
      const prefixes = ['Astra', 'Nebul', 'Cosm', 'Stel', 'Lun', 'Cel', 'Vort', 'Nyx', 'Gal', 'Zeph', 
                        'Draco', 'Lyra', 'Cyg', 'Oph', 'Ori', 'Canis', 'Ursa', 'Aqui', 'Scor', 'Pers',
                        'Andr', 'Cas', 'Peg', 'Ceph', 'Aur', 'Boöt', 'Cen', 'Pyth', 'Astr', 'Neb'];
      const middles = ['or', 'ix', 'ar', 'on', 'is', 'en', 'os', 'ia', 'us', 'yn',
                       'el', 'op', 'an', 'io', 'er', 'al', 'om', 'ur', 'ax', 'il'];
      const suffixes = ['ion', 'ara', 'ix', 'us', 'ia', 'or', 'is', 'ax', 'yn', 'os',
                        'ius', 'eon', 'yx', 'ella', 'icus', 'ides', 'onis', 'eus', 'aos', 'eth'];
      
      let name = '';
      
      // Random structure: prefix + middle + suffix OR prefix + suffix
      if (random() > 0.5) {
        name = random(prefixes) + random(middles) + random(suffixes);
      } else {
        name = random(prefixes) + random(suffixes);
      }
      
      return name.toUpperCase();
    }

    function generatePlanetName() {
      const prefixes = ['Zor', 'Kep', 'Xan', 'Thal', 'Quen', 'Vel', 'Drak', 'Mor', 'Zyth', 'Kar',
                        'Nex', 'Vor', 'Brak', 'Thul', 'Xyl', 'Grax', 'Nox', 'Vex', 'Zal', 'Kron',
                        'Pyr', 'Syx', 'Tor', 'Vyn', 'Kax', 'Myr', 'Rax', 'Zyx', 'Thrax', 'Vorn'];
      const middles = ['id', 'un', 'ax', 'or', 'in', 'el', 'ak', 'us', 'yn', 'is',
                       'ex', 'ox', 'al', 'om', 'yr', 'on', 'ar', 'ol', 'ix', 'an'];
      const suffixes = ['oth', 'ion', 'ar', 'ix', 'us', 'on', 'ia', 'en', 'os', 'ax',
                        'ium', 'yx', 'eth', 'onn', 'ara', 'eer', 'oth', 'ius', 'eos', 'orn'];
      
      let name = '';
      
      if (random() > 0.4) {
        name = random(prefixes) + random(middles) + random(suffixes);
      } else {
        name = random(prefixes) + random(suffixes);
      }
      
      return name.toUpperCase();
    }

    function generateMoonName() {
      const prefixes = ['Lun', 'Pho', 'Dio', 'Tri', 'Cal', 'Eur', 'Gan', 'Titan', 'Rhea', 'Mim'];
      const middles = ['a', 'o', 'i', 'e', 'u'];
      const suffixes = ['s', 'x', 'n', 'r', 'l', 'th', 'os', 'us', 'is'];
      
      let name = '';
      
      if (random() > 0.3) {
        name = random(prefixes) + random(middles) + random(suffixes);
      } else {
        name = random(prefixes) + random(suffixes);
      }
      
      return name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
    }

    function generateStarName() {
      const prefixes = ['Al', 'Be', 'Si', 'Ri', 'Den', 'Ras', 'Min', 'Sai', 'Reg', 'Pol',
                        'Arc', 'Ald', 'Ant', 'Cap', 'Veg', 'Alt', 'Bet', 'Prox', 'Mir', 'Zet',
                        'Alp', 'Del', 'Gam', 'Eps', 'Eta', 'The', 'Iota', 'Kap', 'Lam', 'Sig'];
      const middles = ['ta', 'ge', 'ri', 'de', 'pha', 'eb', 'al', 'ka', 'ul', 'ux',
                       'bar', 'tar', 'nar', 'tor', 'deb', 'tel', 'cen', 'her', 'ara', 'cir'];
      const suffixes = ['us', 'x', 'rix', 'min', 'tan', 'res', 'bor', 'gol', 'tar', 'ran',
                        'is', 'el', 'or', 'an', 'on', 'ux', 'ius', 'air', 'es', 'ath'];
      
      let name = '';
      
      if (random() > 0.5) {
        name = random(prefixes) + random(middles) + random(suffixes);
      } else {
        name = random(prefixes) + random(suffixes);
      }
      
      return name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
    }

    function generateMythology() {
      const heroes = ['warrior', 'hunter', 'guardian', 'protector', 'hero', 'champion', 'defender', 'sentinel'];
      const creatures = ['dragon', 'phoenix', 'serpent', 'lion', 'eagle', 'wolf', 'bear', 'stag'];
      const actions = ['defeated', 'tamed', 'protected', 'saved', 'rescued', 'guided', 'defended', 'conquered'];
      const places = ['kingdom', 'realm', 'land', 'world', 'empire', 'domain', 'territory', 'cosmos'];
      const virtues = ['courage', 'wisdom', 'strength', 'honor', 'justice', 'compassion', 'loyalty', 'valor'];
      
      let mythology = '';
      let mythType = int(random(3));
      
      if (mythType === 0) {
        // Hero story
        mythology = `Ancient tales speak of a legendary ${random(heroes)} who ${random(actions)} a great ${random(creatures)} that threatened the ${random(places)}. For their ${random(virtues)}, the gods immortalized them in the stars.`;
      } else if (mythType === 1) {
        // Creature story
        mythology = `This constellation represents the mighty ${random(creatures)} that once ${random(actions)} the ${random(places)}. Its ${random(virtues)} was so great that it earned a place among the eternal stars.`;
      } else {
        // Divine story
        mythology = `The ancient ${random(heroes)} was chosen by the gods to ${random(['guide', 'watch over', 'illuminate', 'protect'])} the ${random(places)}. Their ${random(virtues)} shines forever in the night sky.`;
      }
      
      return mythology;
    }

    function getGoldilocksZone(starTypeName) {
      // Calculate habitable zone based on star type
      // Distances are in units matching our solar system scale
      let zones = {
        'Blue Giant': { inner: 200, outer: 350 },
        'Yellow Star': { inner: 120, outer: 220 },
        'Orange Star': { inner: 100, outer: 180 },
        'Red Giant': { inner: 180, outer: 320 },
        'White Dwarf': { inner: 50, outer: 100 }
      };
      return zones[starTypeName] || { inner: 120, outer: 220 };
    }

    function generateSolarSystemName() {
      const prefixes = ['Alpha', 'Beta', 'Gamma', 'Delta', 'Epsilon', 'Zeta', 'Theta', 'Omega', 'Sigma', 'Nova'];
      const middles = ['Centauri', 'Draconis', 'Orionis', 'Aquilae', 'Cygni', 'Lyrae', 'Aurigae', 'Persei', 'Andromedae', 'Phoenicis'];
      const suffixes = ['Prime', 'Major', 'Minor', 'Secundus', 'Tertius', 'Alpha', 'Beta', 'One', 'Two', 'Three'];
      
      let name = '';
      
      // Random structure variations
      let structure = int(random(4));
      
      if (structure === 0) {
        // Prefix + Middle (e.g., "Alpha Centauri")
        name = random(prefixes) + ' ' + random(middles);
      } else if (structure === 1) {
        // Prefix + Middle + Suffix (e.g., "Beta Draconis Prime")
        name = random(prefixes) + ' ' + random(middles) + ' ' + random(suffixes);
      } else if (structure === 2) {
        // Middle + Suffix (e.g., "Orionis Major")
        name = random(middles) + ' ' + random(suffixes);
      } else {
        // Just Middle (e.g., "Andromeda")
        name = random(middles);
      }
      
      return name + ' System';
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      generateSystem();
    }
    
    function generateSystem() {
      // Clear all existing data
      stars = [];
      nebulas = [];
      galaxies = [];
      pulsars = [];
      constellations = [];
      planets = [];
      asteroidBelt = null;
      flameParticles = [];
      solarFlares = [];
      lastSolarFlare = millis();
      
      // Generate solar system name - use selected star name if transitioning
      if (isTransitioning && selectedConstellationStar && selectedConstellationStar.name) {
        solarSystemName = selectedConstellationStar.name + ' System';
      } else {
        solarSystemName = generateSolarSystemName();
      }
      
      // Randomly select star type and colors
      let starTypes = [
        {
          name: 'Blue Giant',
          outer: { r: 150, g: 200, b: 255 },
          corona: { r: 180, g: 220, b: 255 },
          core: { r: 200, g: 230, b: 255 },
          middle: { r: 220, g: 240, b: 255 },
          hot: { r: 240, g: 250, b: 255 },
          center: { r: 255, g: 255, b: 255 },
          flameOuter: { r: 180, g: 220, b: 255 },
          flameMid: { r: 200, g: 230, b: 255 },
          flameInner: { r: 220, g: 245, b: 255 }
        },
        {
          name: 'Yellow Star',
          outer: { r: 255, g: 150, b: 0 },
          corona: { r: 255, g: 180, b: 0 },
          core: { r: 255, g: 120, b: 0 },
          middle: { r: 255, g: 200, b: 0 },
          hot: { r: 255, g: 255, b: 150 },
          center: { r: 255, g: 255, b: 255 },
          flameOuter: { r: 255, g: 100, b: 0 },
          flameMid: { r: 255, g: 200, b: 0 },
          flameInner: { r: 255, g: 255, b: 200 }
        },
        {
          name: 'Orange Star',
          outer: { r: 255, g: 100, b: 0 },
          corona: { r: 255, g: 130, b: 20 },
          core: { r: 255, g: 90, b: 0 },
          middle: { r: 255, g: 150, b: 30 },
          hot: { r: 255, g: 200, b: 100 },
          center: { r: 255, g: 240, b: 200 },
          flameOuter: { r: 255, g: 80, b: 0 },
          flameMid: { r: 255, g: 150, b: 0 },
          flameInner: { r: 255, g: 220, b: 150 }
        },
        {
          name: 'Red Giant',
          outer: { r: 255, g: 50, b: 0 },
          corona: { r: 255, g: 80, b: 30 },
          core: { r: 255, g: 40, b: 0 },
          middle: { r: 255, g: 100, b: 50 },
          hot: { r: 255, g: 150, b: 100 },
          center: { r: 255, g: 200, b: 180 },
          flameOuter: { r: 255, g: 50, b: 0 },
          flameMid: { r: 255, g: 120, b: 40 },
          flameInner: { r: 255, g: 180, b: 120 }
        },
        {
          name: 'White Dwarf',
          outer: { r: 220, g: 230, b: 255 },
          corona: { r: 230, g: 240, b: 255 },
          core: { r: 240, g: 245, b: 255 },
          middle: { r: 245, g: 250, b: 255 },
          hot: { r: 250, g: 252, b: 255 },
          center: { r: 255, g: 255, b: 255 },
          flameOuter: { r: 200, g: 220, b: 255 },
          flameMid: { r: 230, g: 240, b: 255 },
          flameInner: { r: 250, g: 252, b: 255 }
        }
      ];
      
      let selectedStarType = random(starTypes);
      starType = selectedStarType.name;
      starColors = selectedStarType;
      
      // Vary sun size based on star type and add randomness
      if (starType === 'Blue Giant') {
        sunSize = random(90, 120); // Larger
        starTemperature = random(10000, 30000);
        starAge = random(0.01, 0.1); // Very young
        starLuminosity = random(10000, 100000);
        starMass = random(10, 50);
      } else if (starType === 'Red Giant') {
        sunSize = random(100, 140); // Largest
        starTemperature = random(3000, 4500);
        starAge = random(8, 12); // Old
        starLuminosity = random(1000, 10000);
        starMass = random(0.8, 3);
      } else if (starType === 'White Dwarf') {
        sunSize = random(30, 50); // Smallest
        starTemperature = random(8000, 40000);
        starAge = random(10, 13); // Very old
        starLuminosity = random(0.0001, 0.1);
        starMass = random(0.5, 1.4);
      } else if (starType === 'Yellow Star') {
        sunSize = random(55, 75); // Medium
        starTemperature = random(5200, 6000);
        starAge = random(1, 10);
        starLuminosity = random(0.8, 1.5);
        starMass = random(0.8, 1.2);
      } else if (starType === 'Orange Star') {
        sunSize = random(60, 80); // Medium-large
        starTemperature = random(3700, 5200);
        starAge = random(1, 12);
        starLuminosity = random(0.4, 0.8);
        starMass = random(0.6, 0.9);
      }
      
      // Create starfield
      for (let i = 0; i < 500; i++) {
        stars.push({
          x: random(-width, width),
          y: random(-height, height),
          size: random(1, 3),
          twinkle: random(TWO_PI),
          twinkleSpeed: random(0.02, 0.05)
        });
      }
      
      // Create rare pulsars (0-2 per system)
      let numPulsars = random() < 0.6 ? int(random(0, 3)) : 0; // 60% chance to have any
      for (let i = 0; i < numPulsars; i++) {
        let rotationPeriod = random(0.001, 0.1); // seconds
        let isMillisecond = rotationPeriod < 0.01;
        pulsars.push({
          x: random(-width/2, width/2),
          y: random(-height/2, height/2),
          pulsePhase: random(TWO_PI),
          pulseSpeed: random(0.08, 0.15), // Fast rotation
          beamAngle: random(TWO_PI),
          beamRotationSpeed: random(0.05, 0.12),
          size: random(3, 6),
          color: random() > 0.5 ? 
            { r: 200, g: 220, b: 255 } : // Blue-white
            { r: 255, g: 200, b: 220 },  // Pink-white
          // Physical properties
          name: generateStarName() + (isMillisecond ? ' MSP' : ''),
          rotationPeriod: rotationPeriod,
          magneticField: random(1e8, 1e14), // Gauss
          age: random(10, 10000), // Million years
          distance: random(500, 50000), // Light years
          mass: random(1.2, 2.0), // Solar masses
          radius: random(10, 20), // Kilometers
          temperature: random(500000, 3000000) // Kelvin (X-ray emitting surface)
        });
      }
      
      // Create nebula clouds with complex structure
      for (let i = 0; i < 3; i++) {
        let baseX = random(-width/2, width/2);
        let baseY = random(-height/2, height/2);
        let embeddedStars = [];
        let dustParticles = [];
        
        // Create dust particles for organic cloud shape
        for (let j = 0; j < 400; j++) {
          let angle = random(TWO_PI);
          let distance = randomGaussian() * 120;
          dustParticles.push({
            x: cos(angle) * distance,
            y: sin(angle) * distance,
            size: random(1, 4),
            opacity: random(0.3, 1),
            colorIndex: int(random(4))
          });
        }
        
        // Add newborn stars within nebula
        for (let j = 0; j < int(random(5, 12)); j++) {
          embeddedStars.push({
            x: baseX + random(-80, 80),
            y: baseY + random(-80, 80),
            brightness: random(0.5, 1),
            size: random(2, 5),
            twinkle: random(TWO_PI)
          });
        }
        
        nebulas.push({
          x: baseX,
          y: baseY,
          size: random(200, 400),
          noiseOffsetX: random(1000),
          noiseOffsetY: random(1000),
          rotation: random(TWO_PI),
          rotationSpeed: random(-0.0005, 0.0005),
          // Vibrant deep colors that fade
          colors: [
            { r: 0, g: 180, b: 200, a: 60 },      // Vibrant deep cyan
            { r: 200, g: 0, b: 140, a: 55 },      // Vibrant magenta
            { r: 180, g: 80, b: 20, a: 50 },      // Rich burnt orange
            { r: 60, g: 100, b: 200, a: 45 }      // Deep vibrant blue
          ],
          embeddedStars: embeddedStars,
          dustParticles: dustParticles
        });
      }
      
      // Create distant galaxies (2-4 galaxies)
      for (let i = 0; i < int(random(2, 5)); i++) {
        let galaxyType = random() > 0.5 ? 'spiral' : 'elliptical';
        let x = random(-width/2, width/2);
        let y = random(-height/2, height/2);
        
        if (galaxyType === 'spiral') {
          // Spiral galaxy
          let arms = int(random(2, 5)); // 2-4 spiral arms
          let armParticles = [];
          
          for (let arm = 0; arm < arms; arm++) {
            let armAngle = (TWO_PI / arms) * arm;
            let particlesPerArm = 150;
            
            for (let p = 0; p < particlesPerArm; p++) {
              let progress = p / particlesPerArm;
              let distance = progress * random(80, 120);
              let angle = armAngle + progress * PI * random(3, 5); // Spiral tightness
              let spread = randomGaussian() * 8 * progress; // Spread increases outward
              
              armParticles.push({
                x: cos(angle) * distance + spread,
                y: sin(angle) * distance + spread,
                brightness: random(0.3, 1) * (1 - progress * 0.5),
                size: random(0.5, 2)
              });
            }
          }
          
          // Add central bulge
          let bulgeParticles = [];
          for (let p = 0; p < 80; p++) {
            let angle = random(TWO_PI);
            let distance = randomGaussian() * 15;
            bulgeParticles.push({
              x: cos(angle) * distance,
              y: sin(angle) * distance,
              brightness: random(0.6, 1),
              size: random(1, 3)
            });
          }
          
          galaxies.push({
            x: x,
            y: y,
            type: 'spiral',
            rotation: random(TWO_PI),
            rotationSpeed: random(-0.0003, 0.0003),
            armParticles: armParticles,
            bulgeParticles: bulgeParticles,
            color: { r: random(150, 220), g: random(180, 240), b: 255 },
            scale: random(0.6, 1.2)
          });
        } else {
          // Elliptical galaxy
          let particles = [];
          let numParticles = 300;
          
          for (let p = 0; p < numParticles; p++) {
            let angle = random(TWO_PI);
            let distance = randomGaussian() * 50;
            distance = abs(distance);
            
            particles.push({
              x: cos(angle) * distance * random(0.8, 1.2),
              y: sin(angle) * distance * random(0.4, 0.8), // Elliptical shape
              brightness: random(0.4, 1) * (1 - distance / 100),
              size: random(0.5, 2)
            });
          }
          
          galaxies.push({
            x: x,
            y: y,
            type: 'elliptical',
            rotation: random(TWO_PI),
            rotationSpeed: random(-0.0002, 0.0002),
            particles: particles,
            color: { r: 255, g: random(200, 240), b: random(180, 220) },
            scale: random(0.7, 1.3)
          });
        }
      }
      
      // Create constellations
      for (let i = 0; i < 5; i++) {
        let constellation = [];
        let numStars = int(random(5, 8));  // At least 5 stars for good connections
        
        // Pick a central position
        let centerX = random(-width/2 + 100, width/2 - 100);
        let centerY = random(-height/2 + 100, height/2 - 100);
        
        for (let j = 0; j < numStars; j++) {
          constellation.push({
            x: centerX + random(-60, 60),  // Tighter clustering
            y: centerY + random(-60, 60),
            twinkle: random(TWO_PI),
            twinkleSpeed: random(0.02, 0.05),
            name: generateStarName()
          });
        }
        
        constellations.push({
          stars: constellation,
          name: generateConstellationName(),
          labelX: centerX,
          labelY: centerY - 80,
          hovered: false,
          mythology: generateMythology()
        });
      }
      
      // Initialize flame particles
      for (let i = 0; i < 50; i++) {
        flameParticles.push(createFlameParticle());
      }
      
      // Create random number of planets (1-9) with random colors and properties
      let numPlanets = int(random(1, 10)); // 1 to 9 planets
      // Base distance must be far enough to not intersect the star (radius + glow)
      let baseDistance = sunSize / 2 + 60; // Sun radius plus safe margin
      let distanceIncrement = 50;
      
      for (let i = 0; i < numPlanets; i++) {
        let distance = baseDistance + i * distanceIncrement + random(-15, 15);
        let planetSize = random(12, 50);
        let speed = random(0.002, 0.025) * (1 / (i + 1)); // Slower as distance increases
        let planetColor = color(random(50, 255), random(50, 255), random(50, 255));
        let ellipseRatioX = random(0.7, 1.4);
        let ellipseRatioY = random(0.7, 1.4);
        let rotationSpeed = random(0.5, 48); // Hours for one rotation (0.5 to 48 hours)
        
        planets.push(new Planet(distance, planetSize, speed, planetColor, generatePlanetName(), ellipseRatioX, ellipseRatioY, rotationSpeed));
      }
      
      // Randomly add moons and rings to planets
      for (let planet of planets) {
        planet.randomizeFeatures();
      }
      
      // Force at least one habitable planet based on system size
      let shouldForceHabitable = false;
      if (numPlanets >= 5) {
        shouldForceHabitable = random() < 0.75; // 75% chance for 5+ planets
      } else {
        shouldForceHabitable = random() < 0.10; // 10% chance for <5 planets
      }
      
      if (shouldForceHabitable && planets.length > 0) {
        let goldilocksZone = getGoldilocksZone(starType);
        
        // Try to find a planet already in the Goldilocks zone
        let candidatePlanets = planets.filter(p => 
          p.distance >= goldilocksZone.inner && p.distance <= goldilocksZone.outer
        );
        
        // If no planet in zone, pick a random one and move it there
        if (candidatePlanets.length === 0) {
          candidatePlanets = [random(planets)];
          // Move it to the middle of Goldilocks zone
          let targetDistance = (goldilocksZone.inner + goldilocksZone.outer) / 2;
          candidatePlanets[0].distance = targetDistance;
        }
        
        // Make one of these planets habitable
        let habitablePlanet = random(candidatePlanets);
        habitablePlanet.makeHabitable(goldilocksZone);
      }
      
      // 70% chance to have an asteroid belt
      if (random() < 0.7) {
        asteroidBelt = {
          distance: random(140, 768), // Between Mars and Jupiter equivalent
          asteroids: [],
          ellipseRatioX: random(0.7, 1.3),
          ellipseRatioY: random(0.7, 1.3),
          rotation: random(TWO_PI)
        };
        
        // Create individual asteroids
        let numAsteroids = int(random(80, 150));

    function draw() {
      background(0);

      if (isTransitioning) {
        updateTransition();
      }

      // Draw distant galaxies

      drawingContext.globalAlpha = 1 - systemFade;
      drawGalaxies();
      pop();
      
      // Draw pulsars

      drawingContext.globalAlpha = 1 - systemFade;
      drawPulsars();

      // Draw nebulas

      drawingContext.globalAlpha = 1 - systemFade;
      drawNebulas();

      // Draw stars

      drawStars();

      drawConstellations();

        // Add subtle glow

        text(enteringText, 0, -100);

      pop();

      if (systemFade < 0.99 && planets.length > 0) {

        // Draw blazing sun with flames

        // Draw and update asteroid belt if it exists

          planet.checkHover(relMouseX, relMouseY);

      // Update name transition animation
      if (nameTransitionActive) {

      // Draw solar system name in upper left corner with flashy transition
      push();
      noStroke();
      textAlign(LEFT, TOP);
      textSize(24);
      textFont('PT Sans');
      
      if (nameTransitionActive) {
        // Letter-by-letter flip animation
        let displayText = '';
        let maxLen = max(oldSolarSystemName.length, solarSystemName.length);
        
        for (let i = 0; i < maxLen; i++) {
          let letterProgress = constrain((nameTransitionProgress * maxLen) - i, 0, 1);
          
          if (letterProgress < 0.5) {
            // Show old letter with flip effect
            if (i < oldSolarSystemName.length) {
              push();
              translate(30 + textWidth(displayText), 30);
              scale(1 - letterProgress * 2, 1); // Horizontal flip
              fill(200, 220, 255, 180 * (1 - letterProgress * 2));
              text(oldSolarSystemName[i], 0, 0);
              pop();
            }
          } else {
            // Show new letter with flip effect
            if (i < solarSystemName.length) {
              push();
              translate(30 + textWidth(displayText), 30);
              scale((letterProgress - 0.5) * 2, 1); // Horizontal flip in
              let alpha = 180 * ((letterProgress - 0.5) * 2);
              fill(200, 220, 255, alpha);
              text(solarSystemName[i], 0, 0);
              // Add glow for new letters
              fill(255, 255, 255, alpha * 0.5);
              text(solarSystemName[i], 0, 0);
              pop();
            }
          }
          
          // Add to display text for width calculation
          if (letterProgress >= 0.5 && i < solarSystemName.length) {
            displayText += solarSystemName[i];
          } else if (letterProgress < 0.5 && i < oldSolarSystemName.length) {
            displayText += oldSolarSystemName[i];
          }
        }
      } else {
        // Normal display
        fill(200, 220, 255, 180);

      // Update and draw star info panel
      updateStarPanelAnimation();

    function updatePanelAnimation() {
      if (panelAnimState === 'opening') {
        panelAnimProgress += 0.08;
        if (panelAnimProgress >= 1) {
          panelAnimProgress = 1;
          panelAnimState = 'open';
        }
      } else if (panelAnimState === 'closing') {
        panelAnimProgress -= 0.08;
        if (panelAnimProgress <= 0) {
          panelAnimProgress = 0;
          panelAnimState = 'closed';
          selectedPlanet = null;
          // If there's a target planet, open it
          if (targetPlanet !== null) {
            selectedPlanet = targetPlanet;
            targetPlanet = null;
            panelAnimState = 'opening';
          }
        }
      }
    }
    
    function updateStarPanelAnimation() {
      if (starPanelAnimState === 'opening') {
        starPanelAnimProgress += 0.08;
        if (starPanelAnimProgress >= 1) {
          starPanelAnimProgress = 1;
          starPanelAnimState = 'open';
        }
      } else if (starPanelAnimState === 'closing') {
        starPanelAnimProgress -= 0.08;
        if (starPanelAnimProgress <= 0) {
          starPanelAnimProgress = 0;
          starPanelAnimState = 'closed';
          selectedStar = false;
        }
      }
    }
    
    function updatePulsarPanelAnimation() {
      if (pulsarPanelAnimState === 'opening') {
        pulsarPanelAnimProgress += 0.08;
        if (pulsarPanelAnimProgress >= 1) {
          pulsarPanelAnimProgress = 1;
          pulsarPanelAnimState = 'open';
        }
      } else if (pulsarPanelAnimState === 'closing') {
        pulsarPanelAnimProgress -= 0.08;
        if (pulsarPanelAnimProgress <= 0) {
          pulsarPanelAnimProgress = 0;
          pulsarPanelAnimState = 'closed';
          selectedPulsar = null;
        }
      }
    }
    
    function updateTransition() {
      // Adjust speed based on phase - phase 4 is slower for the "Entering" text display
      let currentSpeed = (transitionPhase === 4) ? 0.008 : transitionSpeed; // 2 seconds at 60fps
      transitionProgress += currentSpeed;
      
      if (transitionProgress >= 1) {
        transitionProgress = 0;
        transitionPhase++;
      }
      
      // Phase 0: Fade out solar system completely
      if (transitionPhase === 0) {
        systemFade = transitionProgress;
        if (transitionProgress >= 0.90) {
          // Clear old system data early to ensure complete fade
          planets = [];
          asteroidBelt = null;
          flameParticles = [];
          solarFlares = [];
        }
      }
      // Phase 1: Fade out all constellations EXCEPT the selected one
      else if (transitionPhase === 1) {
        otherConstellationsFade = transitionProgress;
      }
      // Phase 2: Zoom selected constellation to fill screen
      else if (transitionPhase === 2) {
        let targetZoom = 8; // Much larger zoom to fill screen
        constellationZoom = 1 + (targetZoom - 1) * transitionProgress;
        // Offsets are calculated in the draw function based on selected star position
      }
      // Phase 3: Fade out all stars in constellation except selected one
      else if (transitionPhase === 3) {
        selectedConstellationFade = transitionProgress;
      }
      // Phase 4: Display "Entering [star name] System" text and wait
      else if (transitionPhase === 4) {
        // Fade in text at the start
        enteringTextFade = min(transitionProgress * 3, 1);
      }
      // Phase 5: Fade out "Entering..." text and selected star
      else if (transitionPhase === 5) {
        enteringTextFade = 1 - transitionProgress;
      }
      // Phase 6: Generate new system
      else if (transitionPhase === 6) {
        if (transitionProgress === 0) { // Only on first frame of phase 6
          // Store old name and trigger name animation
          oldSolarSystemName = solarSystemName;
          // Generate new system
          generateSystem();
          systemFade = 1; // Start with system invisible, will fade in during phase 7
          // Start name transition animation
          nameTransitionActive = true;
          nameTransitionProgress = 0;
        }
        // Zoom back to normal
        constellationZoom = 8 - (8 - 1) * transitionProgress;
      }
      // Phase 7: Fade in new system and fade out old constellation
      else if (transitionPhase === 7) {
        systemFade = 1 - transitionProgress; // Fade in new system
        // Old constellation fades out in drawConstellations based on constellationAlpha
      }
      // Phase 8: Reset and complete
      else if (transitionPhase === 8) {
        isTransitioning = false;
        transitionPhase = 0;
        transitionProgress = 0;
        constellationZoom = 1;
        constellationOffsetX = 0;
        constellationOffsetY = 0;
        systemFade = 0;
        otherConstellationsFade = 0;
        selectedConstellationFade = 0;
        enteringTextFade = 0;
        selectedConstellationStar = null;
        selectedConstellation = null;
      }
    }
    
    function updateConstellationPanelAnimation() {
      if (constellationPanelAnimState === 'opening') {
        constellationPanelAnimProgress += 0.08;
        if (constellationPanelAnimProgress >= 1) {
          constellationPanelAnimProgress = 1;
          constellationPanelAnimState = 'open';
        }
      } else if (constellationPanelAnimState === 'closing') {
        constellationPanelAnimProgress -= 0.08;
        if (constellationPanelAnimProgress <= 0) {
          constellationPanelAnimProgress = 0;
          constellationPanelAnimState = 'closed';
          // Don't clear selectedConstellation if we're transitioning to a new system
          if (!isTransitioning) {
            selectedConstellation = null;
          }
        }
      }
    }
    
    function drawStarInfoPanel() {
      if (!selectedStar) return;
      
      push();
      
      let panelX = width - 300;
      let panelY = 20;
      let panelWidth = 260;
      let panelHeight = 680;
      
      let easeProgress = starPanelAnimProgress * starPanelAnimProgress * (3 - 2 * starPanelAnimProgress);
      
      let pixelSize = 8;
      let revealHeight = panelHeight * easeProgress;
      
      // Clip the panel background to animated height
      drawingContext.save();
      drawingContext.beginPath();
      drawingContext.rect(panelX, panelY, panelWidth, revealHeight);
      drawingContext.clip();
      
      // Panel shadow
      fill(0, 0, 0, 100 * easeProgress);
      rect(panelX + 5, panelY + 5, panelWidth, panelHeight, 10);
      
      // Panel background

      rect(panelX, panelY, panelWidth, panelHeight, 10);

      // Digital pixel reveal effect (outside clip)
      if (panelAnimProgress < 1) {
        noStroke();
        for (let y = revealHeight; y < revealHeight + pixelSize * 3; y += pixelSize) {
          for (let x = 0; x < panelWidth; x += pixelSize) {
            if (random() > 0.3) {
              fill(red(selectedPlanet.col), green(selectedPlanet.col), blue(selectedPlanet.col), random(50, 150));
              rect(panelX + x, panelY + y, pixelSize - 1, pixelSize - 1);
            }
          }
        }
      }
      
      // Planet preview (larger visual with details) - drawn OUTSIDE clipping so moons/rings can overflow
      let previewX = panelX + panelWidth / 2;
      let previewY = panelY + 130;
      let previewSize = Math.min(selectedPlanet.size * 3.5, 100);
      
      push();
      translate(previewX, previewY);
      
      // Draw rings behind planet if it has them
      if (selectedPlanet.hasRings) {
        for (let ring of selectedPlanet.rings) {
          push();
          rotate(ring.rotation);
          noFill();
          let scaleFactor = previewSize / selectedPlanet.size;
          let innerR = ring.innerRadius * scaleFactor;
          let outerR = ring.outerRadius * scaleFactor;
          stroke(red(ring.color), green(ring.color), blue(ring.color), ring.opacity * 1.5);
          strokeWeight((outerR - innerR));
          ellipse(0, 0, innerR * 2, innerR * 2);
          pop();
        }
      }
      
      // Preview glow
      noStroke();
      for (let i = 5; i > 0; i--) {
        fill(red(selectedPlanet.col), green(selectedPlanet.col), blue(selectedPlanet.col), 50 / i);
        ellipse(0, 0, previewSize + i * 20, previewSize + i * 20);
      }
      
      // Preview planet
      fill(selectedPlanet.col);
      ellipse(0, 0, previewSize, previewSize);
      
      // Add randomized surface details
      fill(red(selectedPlanet.col) * 0.7, green(selectedPlanet.col) * 0.7, blue(selectedPlanet.col) * 0.7, 120);
      for (let detail of selectedPlanet.surfaceDetails) {
        ellipse(detail.x * previewSize, detail.y * previewSize, detail.size * previewSize, detail.size * previewSize);
      }
      
      // Add atmospheric glow
      noFill();
      stroke(red(selectedPlanet.col), green(selectedPlanet.col), blue(selectedPlanet.col), 80);
      strokeWeight(3);
      ellipse(0, 0, previewSize + 8, previewSize + 8);
      
      // Draw preview moons if it has them - show all moons
      if (selectedPlanet.moons.length > 0) {
        let scaleFactor = previewSize / selectedPlanet.size;
        
        for (let i = 0; i < selectedPlanet.moons.length; i++) {
          let previewMoon = selectedPlanet.moons[i];
          let moonDist = previewMoon.distance * scaleFactor * 0.7;
          
          // Use the moon's actual angle from the main view
          let moonAngle = previewMoon.angle;
          let moonX = cos(moonAngle) * moonDist;
          let moonY = sin(moonAngle) * moonDist;
          let moonSize = previewMoon.size * scaleFactor * 1.5;
          
          // Moon orbit
          noFill();
          stroke(100, 100, 120, 80);
          strokeWeight(1);
          ellipse(0, 0, moonDist * 2, moonDist * 2);
          
          // Moon with hover highlight
          noStroke();
          
          // Highlight if this moon is hovered in the text
          if (i === hoveredMoonIndex) {
            // Bright highlight glow
            fill(255, 220, 100, 180);
            ellipse(moonX, moonY, moonSize + 8, moonSize + 8);
            fill(255, 220, 100, 120);
            ellipse(moonX, moonY, moonSize + 12, moonSize + 12);
          }
          
          fill(previewMoon.color);
          ellipse(moonX, moonY, moonSize, moonSize);
        }
      }
      
      pop();
      
      // Clip for text content only
      drawingContext.save();
      drawingContext.beginPath();
      drawingContext.rect(panelX, panelY, panelWidth, revealHeight);
      drawingContext.clip();
      
      // Planet name title

      textAlign(LEFT, TOP);

      detailY += lineHeight * 2;

      text("Diameter:", panelX + 20, detailY);
      fill(255);

      fill(150, 180, 255);

      fill(255);
      // Convert frames to Earth years (approximate based on speed)
      let period = TWO_PI / selectedPlanet.speed;
      let earthYears = (period / 60 / 2).toFixed(2); // Convert frames to approximate years
      text(earthYears + " Earth years", panelX + 20, detailY + 15);

      text("Length of Day:", panelX + 20, detailY);

      // Moons

        text(selectedPlanet.moons.length, panelX + 20, detailY + 15);
        detailY += lineHeight * 2;
        
        // Display moon names with hover detection
        moonNamePositions = [];
        textSize(10);
        let moonNames = selectedPlanet.moons.map(m => m.name);
        let currentX = panelX + 20;
        let currentY = detailY;
        let line = "";
        let lineStartIndex = 0;
        
        for (let i = 0; i < moonNames.length; i++) {
          let nameWithComma = moonNames[i] + (i < moonNames.length - 1 ? ", " : "");
          
          if ((line + nameWithComma).length > 28 && line.length > 0) {
            // Draw current line
            text(line.slice(0, -2), currentX, currentY);
            currentY += 15;
            line = nameWithComma;
            lineStartIndex = i;
          } else {
            line += nameWithComma;
          }
          
          // Store moon name position for hover detection
          let nameWidth = textWidth(moonNames[i]);
          let xPos = currentX + textWidth(line) - textWidth(nameWithComma);
          moonNamePositions.push({
            x: xPos,
            y: currentY - 3,
            width: nameWidth,
            height: 12,
            index: i
          });
        }
        
        // Draw remaining line
        if (line.length > 0) {
          text(line.slice(0, line.endsWith(", ") ? -2 : line.length), currentX, currentY);
          currentY += 15;
        }
        
        // Check for moon name hover and highlight
        hoveredMoonIndex = -1;
        for (let moonPos of moonNamePositions) {
          if (mouseX >= moonPos.x && mouseX <= moonPos.x + moonPos.width &&

            fill(255, 220, 100);
            text(moonNames[moonPos.index], moonPos.x, moonPos.y + 3);

      rect(panelX, panelY, panelWidth, panelHeight, 10);
      
      // Panel border glow
      noFill();
      stroke(150, 150, 255, 150 * easeProgress);
      strokeWeight(2);
      rect(panelX, panelY, panelWidth, panelHeight, 10);
      
      drawingContext.restore();
      
      // Digital pixel reveal effect
      if (constellationPanelAnimProgress < 1) {
        noStroke();
        for (let y = revealHeight; y < revealHeight + pixelSize * 3; y += pixelSize) {
          for (let x = 0; x < panelWidth; x += pixelSize) {
            if (random() > 0.3) {
              fill(150, 150, 255, random(50, 150));
              rect(panelX + x, panelY + y, pixelSize - 1, pixelSize - 1);
            }
          }
        }
      }
      
      // Clip for text content
      drawingContext.save();
      drawingContext.beginPath();
      drawingContext.rect(panelX, panelY, panelWidth, revealHeight);
      drawingContext.clip();
      
      // Constellation name title
      noStroke();
      textAlign(LEFT, TOP);
      textSize(22);
      textFont('PT Sans');
      // Drop shadow
      fill(0, 0, 0, 150);
      text(selectedConstellation.name, panelX + 22, panelY + 17);
      // Main text
      fill(255);
      text(selectedConstellation.name, panelX + 20, panelY + 15);
      
      // Divider line
      stroke(100, 100, 150, 100);
      strokeWeight(1);
      line(panelX + 20, panelY + 50, panelX + panelWidth - 20, panelY + 50);
      
      // Details
      let detailY = panelY + 70;
      let lineHeight = 20;
      textAlign(LEFT, TOP);
      textSize(11);
      
      // Number of stars
      fill(150, 180, 255);
      text("Stars in Constellation:", panelX + 20, detailY);
      fill(255);
      text(selectedConstellation.stars.length, panelX + 20, detailY + 15);
      
      detailY += lineHeight * 3;
      
      // Constellation close-up visualization
      let vizBoxX = panelX + 20;
      let vizBoxY = detailY;
      let vizBoxWidth = panelWidth - 40;
      let vizBoxHeight = 150;
      
      // Background for visualization
      fill(10, 15, 30, 200);
      stroke(100, 100, 150, 100);
      strokeWeight(1);
      rect(vizBoxX, vizBoxY, vizBoxWidth, vizBoxHeight, 5);
      
      // Calculate constellation bounds for centering
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (let star of selectedConstellation.stars) {
        minX = min(minX, star.x);
        maxX = max(maxX, star.x);
        minY = min(minY, star.y);
        maxY = max(maxY, star.y);
      }
      
      let constellationWidth = maxX - minX;
      let constellationHeight = maxY - minY;
      let scaleX = (vizBoxWidth - 40) / constellationWidth;
      let scaleY = (vizBoxHeight - 40) / constellationHeight;
      let scale = min(scaleX, scaleY, 1.5); // Limit max scale
      
      let centerX = vizBoxX + vizBoxWidth / 2;
      let centerY = vizBoxY + vizBoxHeight / 2;
      let constellationCenterX = (minX + maxX) / 2;
      let constellationCenterY = (minY + maxY) / 2;
      
      // Draw constellation lines
      stroke(150, 150, 255, 120);
      strokeWeight(1.5);
      for (let i = 0; i < selectedConstellation.stars.length - 1; i++) {
        let x1 = centerX + (selectedConstellation.stars[i].x - constellationCenterX) * scale;
        let y1 = centerY + (selectedConstellation.stars[i].y - constellationCenterY) * scale;
        let x2 = centerX + (selectedConstellation.stars[i + 1].x - constellationCenterX) * scale;
        let y2 = centerY + (selectedConstellation.stars[i + 1].y - constellationCenterY) * scale;
        line(x1, y1, x2, y2);
      }
      if (selectedConstellation.stars.length > 2) {
        let x1 = centerX + (selectedConstellation.stars[selectedConstellation.stars.length - 1].x - constellationCenterX) * scale;
        let y1 = centerY + (selectedConstellation.stars[selectedConstellation.stars.length - 1].y - constellationCenterY) * scale;
        let x2 = centerX + (selectedConstellation.stars[0].x - constellationCenterX) * scale;
        let y2 = centerY + (selectedConstellation.stars[0].y - constellationCenterY) * scale;
        line(x1, y1, x2, y2);
      }
      
      // Draw stars
      noStroke();
      for (let i = 0; i < selectedConstellation.stars.length; i++) {
        let star = selectedConstellation.stars[i];
        let x = centerX + (star.x - constellationCenterX) * scale;
        let y = centerY + (star.y - constellationCenterY) * scale;
        
        // Highlight if this star is being hovered
        if (i === hoveredStarIndex) {
          // Glow effect
          fill(255, 255, 150, 80);
          ellipse(x, y, 16, 16);
          fill(255, 255, 150, 150);
          ellipse(x, y, 10, 10);
          fill(255, 255, 200);
          ellipse(x, y, 6, 6);
        } else {
          fill(200, 200, 255);
          ellipse(x, y, 5, 5);
        }
      }
      
      detailY += vizBoxHeight + 15;
      
      // Star names section
      fill(150, 180, 255);
      text("Star Names:", panelX + 20, detailY);
      detailY += lineHeight;
      
      fill(255);
      textSize(10);
      hoveredStarIndex = -1; // Reset hover state
      for (let i = 0; i < selectedConstellation.stars.length; i++) {
        let starName = selectedConstellation.stars[i].name;
        let nameX = panelX + 25;
        let nameY = detailY;
        
        // Check if mouse is hovering over this star name
        let textBounds = textWidth(`• ${starName}`);
        let isHovering = mouseX >= nameX && mouseX <= nameX + textBounds &&
                         mouseY >= nameY && mouseY <= nameY + 12;
        
        if (isHovering) {
          hoveredStarIndex = i;
          fill(255, 255, 150); // Highlight text
          cursor(HAND);
          
          // Check for click to initiate transition
          if (mouseIsPressed && !isTransitioning) {
            isTransitioning = true;
            transitionPhase = 0;
            transitionProgress = 0;
            selectedConstellationStar = selectedConstellation.stars[i];
            // Close the panel
            constellationPanelAnimState = 'closing';
          }
        } else {
          fill(255);
        }
        
        text(`• ${starName}`, nameX, nameY);
        detailY += 15;
      }
      
      detailY += 10;
      
      // Mythology section
      fill(150, 180, 255);
      textSize(11);
      text("Mythology:", panelX + 20, detailY);
      detailY += lineHeight;
      
      fill(255);
      textSize(10);
      // Wrap mythology text
      let words = selectedConstellation.mythology.split(' ');
      let currentLine = '';
      for (let word of words) {
        let testLine = currentLine + word + ' ';
        if (textWidth(testLine) > panelWidth - 50) {
          text(currentLine, panelX + 20, detailY);
          detailY += 14;
          currentLine = word + ' ';
        } else {
          currentLine = testLine;
        }
      }
      if (currentLine.length > 0) {
        text(currentLine, panelX + 20, detailY);
      }
      
      // Instruction text at bottom
      detailY = panelY + panelHeight - 35;
      fill(150, 150, 150);
      textAlign(CENTER, TOP);
      textSize(10);
      text("Click outside panel to close", panelX + panelWidth/2, detailY);
      
      textAlign(LEFT, TOP);
      
      // Close button
      let closeX = panelX + panelWidth - 40;
      let closeY = panelY + 10;
      let closeSize = 30;
      fill(150, 50, 50, 200 * easeProgress);
      noStroke();
      ellipse(closeX + closeSize/2, closeY + closeSize/2, closeSize, closeSize);
      stroke(255, 255 * easeProgress);
      strokeWeight(2);
      line(closeX + 10, closeY + 10, closeX + 20, closeY + 20);
      line(closeX + 20, closeY + 10, closeX + 10, closeY + 20);
      
      drawingContext.restore();
      pop();
    }

    function drawSun() {
      // Create solar flares periodically (every 15-30 seconds)
      if (millis() - lastSolarFlare > random(15000, 30000)) {
        createSolarFlare();
        lastSolarFlare = millis();
      }
      
      // Update and draw solar flares (draw first so they appear behind sun)
      for (let i = solarFlares.length - 1; i >= 0; i--) {
        let flare = solarFlares[i];
        flare.update();
        flare.display();
        
        if (flare.isDead()) {
          solarFlares.splice(i, 1);
        }
      }
      
      // Update and draw flame particles
      for (let i = flameParticles.length - 1; i >= 0; i--) {
        let p = flameParticles[i];
        p.update();
        p.display();
        
        if (p.isDead()) {
          flameParticles.splice(i, 1);
          flameParticles.push(createFlameParticle());
        }
      }
      
      // Outer glow layers with animation
      for (let i = sunSize * 1.5; i > 0; i -= 8) {
        let pulse = sin(frameCount * 0.05 + i * 0.1) * 10;
        fill(starColors.outer.r, starColors.outer.g, starColors.outer.b, 20);
        noStroke();
        ellipse(0, 0, i + pulse, i + pulse);
      }
      
      // Corona flares
      for (let a = 0; a < TWO_PI; a += PI / 4) {
        let flareLength = sunSize * 0.6 + sin(frameCount * 0.1 + a) * 15;
        let flareAngle = a + sin(frameCount * 0.05) * 0.2;
        push();
        rotate(flareAngle);
        fill(starColors.corona.r, starColors.corona.g, starColors.corona.b, 100);
        triangle(0, -5, flareLength, 0, 0, 5);
        pop();
      }
      
      // Sun core with texture
      fill(starColors.core.r, starColors.core.g, starColors.core.b);
      ellipse(0, 0, sunSize, sunSize);
      
      // Middle layer
      fill(starColors.middle.r, starColors.middle.g, starColors.middle.b);
      ellipse(0, 0, sunSize * 0.85, sunSize * 0.85);
      
      // Hot core
      fill(starColors.hot.r, starColors.hot.g, starColors.hot.b);
      ellipse(0, 0, sunSize * 0.69, sunSize * 0.69);
      
      // Bright center
      fill(starColors.center.r, starColors.center.g, starColors.center.b, 200);
      ellipse(0, 0, sunSize * 0.46, sunSize * 0.46);
    }
    
    function createFlameParticle() {
      let angle = random(TWO_PI);
      let radius = random(sunSize * 0.38, sunSize * 0.54);
      return {
        x: cos(angle) * radius,
        y: sin(angle) * radius,
        vx: cos(angle) * random(0.5, 1.5),
        vy: sin(angle) * random(0.5, 1.5),
        life: 1.0,
        size: random(3, 8),
        update: function() {
          this.x += this.vx;
          this.y += this.vy;
          this.life -= 0.02;
        },
        display: function() {
          let alpha = this.life * 200;
          if (this.life > 0.7) {
            fill(starColors.flameInner.r, starColors.flameInner.g, starColors.flameInner.b, alpha);
          } else if (this.life > 0.4) {
            fill(starColors.flameMid.r, starColors.flameMid.g, starColors.flameMid.b, alpha);
          } else {
            fill(starColors.flameOuter.r, starColors.flameOuter.g, starColors.flameOuter.b, alpha);
          }
          noStroke();
          ellipse(this.x, this.y, this.size * this.life, this.size * this.life);
        },
        isDead: function() {
          return this.life <= 0;
        }
      };
    }
    
    function createSolarFlare() {
      let angle = random(TWO_PI);
      let numParticles = int(random(15, 30));
      let flareParticles = [];
      
      // Create a burst of particles in a cone
      for (let i = 0; i < numParticles; i++) {
        let particleAngle = angle + random(-0.3, 0.3);
        let speed = random(2, 5);
        let startRadius = sunSize * 0.5;
        
        flareParticles.push({
          x: cos(angle) * startRadius,
          y: sin(angle) * startRadius,
          vx: cos(particleAngle) * speed,
          vy: sin(particleAngle) * speed,
          life: 1.0,
          size: random(8, 15),
          hue: random(0, 0.1) // Slight color variation
        });
      }
      
      return {
        particles: flareParticles,
        age: 0,
        maxAge: 60,
        update: function() {
          this.age++;
          for (let p of this.particles) {
            p.x += p.vx;
            p.y += p.vy;
            p.vx *= 0.98; // Slow down
            p.vy *= 0.98;
            p.life = 1 - (this.age / this.maxAge);
          }
        },
        display: function() {
          for (let p of this.particles) {
            if (p.life > 0) {
              let alpha = p.life * 255;
              // Use star's flame colors for the flare
              let coreColor = starColors.flameInner;
              let glowColor = starColors.corona;
              
              // Bright core using star's inner flame color
              fill(coreColor.r, coreColor.g, coreColor.b, alpha * 0.8);
              noStroke();
              ellipse(p.x, p.y, p.size * p.life, p.size * p.life);
              
              // Add glow using star's corona color
              fill(glowColor.r, glowColor.g, glowColor.b, alpha * 0.3);
              ellipse(p.x, p.y, p.size * p.life * 2, p.size * p.life * 2);
            }
          }
        },
        isDead: function() {
          return this.age >= this.maxAge;
        }
      };
    }
